name: Build Joystick Mouse Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup Zephyr SDK
      run: |
        wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
        tar xvf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
        cd zephyr-sdk-0.16.5
        ./setup.sh -t arm-zephyr-eabi
        ./setup.sh -t all
        echo "ZEPHYR_SDK_INSTALL_DIR=$PWD" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git cmake ninja-build gperf \
          ccache dfu-util device-tree-compiler \
          wget python3-dev python3-pip python3-setuptools \
          python3-tk python3-wheel xz-utils file \
          make gcc gcc-multilib g++-multilib libsdl2-dev
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install west pyelftools pyyaml
        
    - name: Initialize ZMK
      run: |
        git clone https://github.com/zmkfirmware/zmk.git zmk
        cd zmk
        west init -l app/
        west update
        west zephyr-export
        echo "ZEPHYR_BASE=$(pwd)/zephyr" >> $GITHUB_ENV
        echo "ZMK_DIR=$(pwd)" >> $GITHUB_ENV
        
    - name: Build for nRF52840 DK
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p build
        cd build
        cmake -B . -S ../config \
          -DBOARD=nrf52840dk_nrf52840 \
          -DDTC_OVERLAY_FILE="../config/board.overlay;../config/joystick.overlay" \
          -DCONFIG_JOYSTICK_DRIVER=y \
          -GNinja
        ninja
        
    - name: Create UF2 for nRF52840 Dongle
      run: |
        cd $GITHUB_WORKSPACE
        # 使用ZMK的uf2转换工具
        python3 zmk/app/boards/arm/nrf52840dongle_nrf52840/uf2conv.py \
          -b 0x1000 \
          -c \
          -o nrf52840dongle_joystick_mouse.uf2 \
          build/zephyr/zephyr.hex
        
    - name: Create release artifacts
      run: |
        cd $GITHUB_WORKSPACE
        cp build/zephyr/zephyr.hex joystick_mouse.hex
        cp build/zephyr/zephyr.elf joystick_mouse.elf
        cp build/zephyr/zephyr.bin joystick_mouse.bin
        
        # 创建归档
        tar -czf joystick_mouse_firmware.tar.gz \
          joystick_mouse.uf2 \
          joystick_mouse.hex \
          joystick_mouse.elf \
          joystick_mouse.bin
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-artifacts
        path: |
          ${{ github.workspace }}/nrf52840dongle_joystick_mouse.uf2
          ${{ github.workspace }}/joystick_mouse_firmware.tar.gz
          
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ github.workspace }}/nrf52840dongle_joystick_mouse.uf2
          ${{ github.workspace }}/joystick_mouse_firmware.tar.gz
        draft: false
        prerelease: false
