# 硬件配置
CONFIG_BOARD_NRF52840_DK=n
CONFIG_BOARD_NRF52840DONGLE_NRF52840=y
CONFIG_SOC_NRF52840_QIAA=y

# 系统配置
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# 时钟配置
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y

# USB配置
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_DEVICE_VID=0xFEED
CONFIG_USB_DEVICE_PID=0x6060
CONFIG_USB_DEVICE_MANUFACTURER="ZMK Joystick"
CONFIG_USB_DEVICE_PRODUCT="Joystick Mouse"
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_USB_HID_BOOT_PROTOCOL=y

# ZMK HID配置
CONFIG_ZMK_HID_CONSUMER_REPORT=y
CONFIG_ZMK_HID_REPORT_TYPE_HIDMOUSE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_MOUSE_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_MOUSE_TICK_DURATION=8

# 禁用蓝牙
CONFIG_BT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT=n

# 摇杆驱动
CONFIG_JOYSTICK_DRIVER=y
CONFIG_JOYSTICK_POLL_INTERVAL=20
CONFIG_JOYSTICK_DEADZONE=100
CONFIG_JOYSTICK_SENSITIVITY=5
CONFIG_JOYSTICK_INVERT_Y=n
CONFIG_JOYSTICK_AUTO_CALIBRATION=y

# ADC配置
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
CONFIG_ADC_ASYNC=y
CONFIG_ADC_NRFX_SAADC_LP_MODE=n
CONFIG_ADC_READY_MESSAGE=n

# GPIO配置
CONFIG_GPIO=y

# 日志配置
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_JOYSTICK_LOG_LEVEL_INF=y
CONFIG_ADC_LOG_LEVEL_WRN=y
CONFIG_USB_DEVICE_LOG_LEVEL_INF=y

# 电源管理
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# 调试配置
CONFIG_DEBUG=y
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_NO_OPTIMIZATIONS=n