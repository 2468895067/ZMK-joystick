# 板子配置
CONFIG_BOARD_NICE_NANO_V2=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_KEYBOARD_NAME="Joystick Mouse"

# USB配置
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_DEVICE_PID=0x0002
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# 蓝牙配置
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Joystick Mouse"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_BT_GATT_CLIENT=n

# 鼠标HID
CONFIG_ZMK_HID_REPORT_TYPE_HIDMOUSE=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_MOUSE_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_MOUSE_TICK_DURATION=8

# 摇杆驱动
CONFIG_JOYSTICK_DRIVER=y
CONFIG_JOYSTICK_POLL_INTERVAL=20
CONFIG_JOYSTICK_DEADZONE=100
CONFIG_JOYSTICK_SENSITIVITY=5
CONFIG_JOYSTICK_INVERT_Y=n
CONFIG_JOYSTICK_AUTO_CALIBRATION=y

# ADC配置
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
CONFIG_ADC_ASYNC=y
CONFIG_ADC_NRFX_SAADC_LP_MODE=n
CONFIG_ADC_NRFX_SAADC_CALIBRATION_MAX_RETRIES=3

# GPIO配置
CONFIG_GPIO=y

# 系统配置
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y

# 电源管理
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# 日志
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_JOYSTICK_LOG_LEVEL_INF=y
CONFIG_ADC_LOG_LEVEL_WRN=y