name: Build Nice!Nano Joystick Mouse

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup Zephyr SDK
      run: |
        wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
        tar xvf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
        cd zephyr-sdk-0.16.5
        ./setup.sh -t arm-zephyr-eabi
        ./setup.sh -t all
        echo "ZEPHYR_SDK_INSTALL_DIR=$PWD" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git cmake ninja-build gperf \
          ccache dfu-util device-tree-compiler \
          wget python3-dev python3-pip python3-setuptools \
          python3-tk python3-wheel xz-utils file \
          make gcc gcc-multilib g++-multilib libsdl2-dev
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install west pyelftools pyyaml
        
    - name: Initialize ZMK
      run: |
        git clone https://github.com/zmkfirmware/zmk.git zmk
        cd zmk
        west init -l app/
        west update
        west zephyr-export
        echo "ZEPHYR_BASE=$(pwd)/zephyr" >> $GITHUB_ENV
        echo "ZMK_DIR=$(pwd)" >> $GITHUB_ENV
        
    - name: Build for Nice!Nano
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p build
        cd build
        cmake -B . -S ../config \
          -DBOARD=nice_nano_v2 \
          -DDTC_OVERLAY_FILE="../config/board.overlay;../config/joystick.overlay" \
          -DCONFIG_JOYSTICK_DRIVER=y \
          -GNinja
        ninja
        
    - name: Convert to UF2
      run: |
        cd $GITHUB_WORKSPACE
        # 转换hex为uf2
        python3 zmk/app/boards/arm/nice_nano_v2/uf2conv.py \
          -b 0x26000 \
          -c \
          -o nice_nano_joystick_mouse.uf2 \
          build/zephyr/zephyr.hex
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nice-nano-firmware
        path: |
          ${{ github.workspace }}/nice_nano_joystick_mouse.uf2
          ${{ github.workspace }}/build/zephyr/zephyr.hex
          ${{ github.workspace }}/build/zephyr/zephyr.elf